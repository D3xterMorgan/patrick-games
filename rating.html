<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding-bottom: 80px;
        }
        .header {
            text-align: center;
            padding: 20px;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .period {
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 15px;
            display: inline-block;
            font-size: 14px;
        }
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 30px 0;
            padding: 0 20px;
        }
        .podium-item {
            text-align: center;
        }
        .podium-item:nth-child(2) { order: 1; }
        .podium-item:nth-child(1) { order: 2; transform: scale(1.2); }
        .podium-item:nth-child(3) { order: 3; }
        .podium-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            margin-bottom: 10px;
        }
        .podium-name { font-size: 14px; font-weight: bold; }
        .podium-stars { color: #ffd700; font-size: 12px; }
        .user-position {
            background: rgba(255,255,255,0.1);
            margin: 20px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #888;
            text-decoration: none;
            font-size: 12px;
        }
        .nav-item.active { color: #667eea; }
        .nav-icon { font-size: 24px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 ТАБЛИЦА ЛИДЕРОВ</h1>
        <div class="period">за 1ч</div>
    </div>
    
    <div class="podium">
        <div class="podium-item">
            <div class="podium-avatar" style="background: #c0c0c0;"></div>
            <div class="podium-name">@kilekills</div>
            <div class="podium-stars">31202 ⭐</div>
        </div>
        <div class="podium-item">
            <div class="podium-avatar" style="background: #ffd700;"></div>
            <div class="podium-name">@ludviig</div>
            <div class="podium-stars">34097 ⭐</div>
        </div>
        <div class="podium-item">
            <div class="podium-avatar" style="background: #cd7f32;"></div>
            <div class="podium-name">@evzzz9</div>
            <div class="podium-stars">28045 ⭐</div>
        </div>
    </div>
    
    <div class="user-position">
        <span>Вы</span>
        <span>0 ⭐</span>
    </div>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🎁</span>
            <span>Кейсы</span>
        </a>
        <a href="games.html" class="nav-item">
            <span class="nav-icon">🎮</span>
            <span>Мини-игры</span>
        </a>
        <a href="rating.html" class="nav-item active">
            <span class="nav-icon">🏆</span>
            <span>Рейтинг</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </a>
    </nav>
</body>
</html>
