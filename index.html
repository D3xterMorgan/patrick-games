<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Игры Патрика</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding-bottom: 80px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
        }
        
        .logo {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .balance {
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
        }
        
        .balance::before {
            content: "⭐";
        }
        
        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
        }
        
        .live-bar {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
        }
        
        .live-indicator {
            color: #00ff00;
            font-size: 12px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .live-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.05);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .banner {
            margin: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            text-align: center;
        }
        
        .banner h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .banner p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .section-title {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 20px;
        }
        
        .case-card {
            background: linear-gradient(135deg, #2d3561 0%, #1a1f3a 100%);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .case-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
        }
        
        .case-image {
            width: 100%;
            height: 120px;
            object-fit: contain;
            margin-bottom: 10px;
        }
        
        .case-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .case-price {
            color: #ffd700;
            font-weight: bold;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #888;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s;
        }
        
        .nav-item.active {
            color: #667eea;
        }
        
        .nav-icon {
            font-size: 24px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #2d3561 0%, #1a1f3a 100%);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        
        .roulette {
            display: flex;
            gap: 10px;
            overflow: hidden;
            margin: 20px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }
        
        .roulette-item {
            min-width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .win-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .win-screen.active {
            display: flex;
        }
        
        .win-item {
            width: 200px;
            height: 200px;
            animation: winPulse 1s ease-in-out;
        }
        
        @keyframes winPulse {
            0% { transform: scale(0) rotate(0deg); }
            50% { transform: scale(1.2) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }
        
        .win-title {
            font-size: 32px;
            margin-top: 20px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ИГРЫ ПАТРИКА</div>
        <div class="header-right">
            <div class="balance" id="balance">0</div>
            <div class="user-avatar"></div>
        </div>
    </div>
    
    <div class="live-bar">
        <span class="live-indicator">● LIVE</span>
        <span id="live-content">Пока никто не открывал кейсы...</span>
    </div>
    
    <div class="banner">
        <h2>МОМЕНТАЛЬНЫЙ</h2>
        <p>автоматический вывод</p>
    </div>
    
    <div class="section-title">БЕСПЛАТНЫЕ КЕЙСЫ</div>
    
    <div class="cases-grid">
        <div class="case-card" onclick="openCase('poor')">
            <img src="patrick.png" alt="Нищий Патрик" class="case-image">
            <div class="case-name">Нищий Патрик</div>
            <div class="case-price">15 ⭐</div>
        </div>
    </div>
    
    <div class="section-title">ОБЫЧНЫЕ КЕЙСЫ</div>
    
    <div class="cases-grid">
        <div class="case-card" onclick="openCase('npc')">
            <img src="NPS.png" alt="NPC" class="case-image">
            <div class="case-name">NPC</div>
            <div class="case-price">1000 ⭐</div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🎁</span>
            <span>Кейсы</span>
        </a>
        <a href="games.html" class="nav-item">
            <span class="nav-icon">🎮</span>
            <span>Мини-игры</span>
        </a>
        <a href="rating.html" class="nav-item">
            <span class="nav-icon">🏆</span>
            <span>Рейтинг</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </a>
    </nav>
    
    <div class="modal" id="caseModal">
        <div class="modal-content">
            <h2 id="modalTitle">Открытие кейса</h2>
            <div class="roulette" id="roulette">
                <div class="roulette-item">❓</div>
                <div class="roulette-item">❓</div>
                <div class="roulette-item">❓</div>
            </div>
            <button class="btn-primary" id="openBtn" onclick="startRoulette()">Открыть за <span id="price">15</span> ⭐</button>
            <button class="btn-primary" style="background: #444; margin-top: 10px;" onclick="closeModal()">Закрыть</button>
        </div>
    </div>
    
    <div class="win-screen" id="winScreen">
        <img src="" alt="" class="win-item" id="winImage">
        <div class="win-title" id="winText">Поздравляем!</div>
        <button class="btn-primary" onclick="closeWin()" style="margin-top: 30px; max-width: 300px;">Забрать</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let userBalance = 0;
        let currentCase = null;
        
        const cases = {
            poor: {
                name: "Нищий Патрик",
                price: 15,
                items: [
                    { name: "1 звезда", image: "1ST.png", chance: 30 },
                    { name: "2 звезды", image: "2ST.png", chance: 25 },
                    { name: "3 звезды", image: "3ST.png", chance: 20 },
                    { name: "5 звезд", image: "5ST.png", chance: 15 },
                    { name: "10 звезд", image: "10ST.png", chance: 7 },
                    { name: "15 звезд", image: "15ST.png", chance: 2.5 },
                    { name: "20 звезд", image: "20ST.png", chance: 0.4 },
                    { name: "25 звезд", image: "25ST.png", chance: 0.1 }
                ]
            },
            npc: {
                name: "NPC",
                price: 1000,
                items: [
                    { name: "Heart", image: "heart.png", price: 15, chance: 25 },
                    { name: "Rose", image: "rose.png", price: 25, chance: 20 },
                    { name: "Bottle", image: "botle.png", price: 50, chance: 15 },
                    { name: "Rocket", image: "rocket.png", price: 50, chance: 15 },
                    { name: "Cake", image: "cake.png", price: 100, chance: 10 },
                    { name: "Diamond", image: "dimand.png", price: 100, chance: 8 },
                    { name: "NFT 1", image: "nft1.png", price: 388, chance: 4 },
                    { name: "NFT 2", image: "nft2.png", price: 397, chance: 2 },
                    { name: "NFT 3", image: "nft3.png", price: 455, chance: 0.6 },
                    { name: "NFT 4", image: "nft4.png", price: 645, chance: 0.3 },
                    { name: "NFT 5", image: "nft5.png", price: 1174, chance: 0.1 }
                ]
            }
        };
        
        function loadBalance() {
            const userId = tg.initDataUnsafe?.user?.id;
            if (userId) {
                fetch(`/api/balance?user_id=${userId}`)
                    .then(r => r.json())
                    .then(data => {
                        userBalance = data.balance || 0;
                        document.getElementById('balance').textContent = userBalance.toFixed(2);
                    })
                    .catch(() => {
                        document.getElementById('balance').textContent = '2';
                    });
            }
        }
        
        function openCase(caseType) {
            currentCase = cases[caseType];
            document.getElementById('modalTitle').textContent = currentCase.name;
            document.getElementById('price').textContent = currentCase.price;
            document.getElementById('caseModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('caseModal').classList.remove('active');
        }
        
        function getRandomItem(items) {
            const random = Math.random() * 100;
            let cumulative = 0;
            for (const item of items) {
                cumulative += item.chance;
                if (random <= cumulative) return item;
            }
            return items[0];
        }
        
        function startRoulette() {
            if (userBalance < currentCase.price) {
                alert('Недостаточно звезд!');
                return;
            }
            
            document.getElementById('openBtn').disabled = true;
            const roulette = document.getElementById('roulette');
            const wonItem = getRandomItem(currentCase.items);
            
            let spins = 0;
            const interval = setInterval(() => {
                const randomItem = currentCase.items[Math.floor(Math.random() * currentCase.items.length)];
                roulette.innerHTML = `
                    <div class="roulette-item">❓</div>
                    <div class="roulette-item" style="background: url('${randomItem.image}') center/contain no-repeat, linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
                    <div class="roulette-item">❓</div>
                `;
                spins++;
                
                if (spins > 20) {
                    clearInterval(interval);
                    showWin(wonItem);
                }
            }, 100);
        }
        
        function showWin(item) {
            document.getElementById('winImage').src = item.image;
            document.getElementById('winText').textContent = `Вы выиграли: ${item.name}!`;
            document.getElementById('winScreen').classList.add('active');
            
            userBalance -= currentCase.price;
            if (item.price) userBalance += item.price;
            document.getElementById('balance').textContent = userBalance.toFixed(2);
            
            const userId = tg.initDataUnsafe?.user?.id;
            if (userId) {
                fetch('/api/open_case', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        case_type: currentCase.name,
                        item: item
                    })
                });
            }
        }
        
        function closeWin() {
            document.getElementById('winScreen').classList.remove('active');
            closeModal();
            document.getElementById('openBtn').disabled = false;
        }
        
        loadBalance();
        
        setInterval(() => {
            fetch('/api/live')
                .then(r => r.json())
                .then(data => {
                    if (data.length > 0) {
                        const last = data[0];
                        document.getElementById('live-content').innerHTML = `
                            <span class="live-item">${last.username} выиграл ${last.item}</span>
                        `;
                    }
                })
                .catch(() => {});
        }, 5000);
    </script>
</body>
</html>
