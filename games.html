<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-игры</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding-bottom: 80px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }
        .logo { font-size: 20px; font-weight: bold; color: #ffd700; }
        .game-card {
            margin: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #2d3561 0%, #1a1f3a 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .game-icon { font-size: 50px; }
        .game-info { flex: 1; }
        .game-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .game-desc { font-size: 14px; opacity: 0.8; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #888;
            text-decoration: none;
            font-size: 12px;
        }
        .nav-item.active { color: #667eea; }
        .nav-icon { font-size: 24px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎮 Мини-игры</div>
    </div>
    
    <div class="game-card">
        <div class="game-icon">🎯</div>
        <div class="game-info">
            <div class="game-name">Рулетка</div>
            <div class="game-desc">Крути и выигрывай!</div>
        </div>
    </div>
    
    <div class="game-card">
        <div class="game-icon">🎣</div>
        <div class="game-info">
            <div class="game-name">Ловля медуз</div>
            <div class="game-desc">Поймай как можно больше!</div>
        </div>
    </div>
    
    <div class="game-card" style="opacity: 0.5;">
        <div class="game-icon">🔒</div>
        <div class="game-info">
            <div class="game-name">Апгрейд</div>
            <div class="game-desc">Скоро будет доступно</div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🎁</span>
            <span>Кейсы</span>
        </a>
        <a href="games.html" class="nav-item active">
            <span class="nav-icon">🎮</span>
            <span>Мини-игры</span>
        </a>
        <a href="rating.html" class="nav-item">
            <span class="nav-icon">🏆</span>
            <span>Рейтинг</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </a>
    </nav>
</body>
</html>
